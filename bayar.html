<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalNew Sultan Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJjwhgy_zZAfmUKTWez1aH4wE2icA6dg",
            authDomain: "salnew.firebaseapp.com",
            databaseURL: "https://salnew-default-rtdb.firebaseio.com",
            projectId: "salnew",
            storageBucket: "salnew.firebasestorage.app",
            messagingSenderId: "542817424491",
            appId: "1:542817424491:web:d04abd155d47cb29c8cd2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // DATA BARANG (Bisa kamu ganti harganya)
        const products = [
            { id: 1, name: "Diamond Free Fire", price: 10000, img: "💎" },
            { id: 2, name: "Pulsa 5rb", price: 6000, img: "📱" },
            { id: 3, name: "Es Teh Sultan", price: 5000, img: "🥤" }
        ];

        // TAMPILKAN BARANG
        window.onload = () => {
            const list = document.getElementById('product-list');
            products.forEach(p => {
                list.innerHTML += `
                    <div class="product-card">
                        <div style="font-size:40px;">${p.img}</div>
                        <h3>${p.name}</h3>
                        <p>Rp ${p.price.toLocaleString()}</p>
                        <button class="btn-buy" onclick="checkout(${p.id})">BELI SEKARANG</button>
                    </div>
                `;
            });
        };

        window.checkout = async function(id) {
            const item = products.find(p => p.id === id);
            
            const { value: phone } = await Swal.fire({
                title: 'Konfirmasi Pembayaran',
                text: `Beli ${item.name} seharga Rp ${item.price.toLocaleString()}`,
                input: 'text',
                inputLabel: 'Masukkan Nomor HP SalNew kamu',
                inputPlaceholder: '08...',
                showCancelButton: true,
                confirmButtonText: 'Bayar Pakai SalNew',
                confirmButtonColor: '#108ee9'
            });

            if (phone) {
                prosesTransaksi(phone, item);
            }
        };

        async function prosesTransaksi(phone, item) {
            const userRef = ref(db, 'users/' + phone);
            const snap = await get(userRef);

            if (snap.exists()) {
                const saldo = snap.val().saldo;
                if (saldo >= item.price) {
                    // POTONG SALDO
                    await update(userRef, { saldo: saldo - item.price });
                    // SIMPAN RIWAYAT
                    await push(ref(db, 'history/' + phone), {
                        type: 'BELI BARANG',
                        amt: item.price,
                        note: item.name,
                        date: new Date().toLocaleString()
                    });

                    Swal.fire('Berhasil!', `${item.name} sudah dibeli. Sisa saldo: Rp ${(saldo - item.price).toLocaleString()}`, 'success');
                } else {
                    Swal.fire('Gagal', 'Saldo Sultan kamu kurang!', 'error');
                }
            } else {
                Swal.fire('Error', 'Nomor HP tidak terdaftar!', 'error');
            }
        }
    </script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 20px; }
        h2 { text-align: center; color: #108ee9; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-card h3 { font-size: 14px; margin: 10px 0; }
        .product-card p { color: #ff4757; font-weight: bold; }
        .btn-buy { width: 100%; border: none; background: #108ee9; color: white; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>SalNew Sultan Shop</h2>
    <div class="grid" id="product-list">
        </div>

</body>
</html>
