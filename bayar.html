<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalNew Gadget Store - 100 Smartphone</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJjwhgy_zZAfmUKTWez1aH4wE2icA6dg",
            authDomain: "salnew.firebaseapp.com",
            databaseURL: "https://salnew-default-rtdb.firebaseio.com",
            projectId: "salnew",
            storageBucket: "salnew.firebasestorage.app",
            messagingSenderId: "542817424491",
            appId: "1:542817424491:web:d04abd155d47cb29c8cd2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const products = [];
        
        // 1. GENERATE 50 IPHONE (ID 1-50)
        const iphoneModels = ["iPhone 11", "iPhone 12", "iPhone 13", "iPhone 14", "iPhone 15 Pro", "iPhone 16 Pro Max"];
        for(let i=1; i<=50; i++) {
            let model = iphoneModels[i % iphoneModels.length];
            products.push({ 
                id: i, 
                name: `${model} - SULTAN ${i}`, 
                price: 7000000 + (i * 200000), 
                img: "🍎" 
            });
        }

        // 2. GENERATE 50 ANDROID (ID 51-100) - VIVO, OPPO, ROG
        const androidBrands = ["Vivo Y16", "Oppo Reno 10", "ROG Phone 8", "Vivo V29", "Oppo Find X6", "ROG Phone 7 Ultimate"];
        for(let i=51; i<=100; i++) {
            let brand = androidBrands[i % androidBrands.length];
            products.push({ 
                id: i, 
                name: `${brand} - SULTAN ${i}`, 
                price: 2000000 + (i * 150000), 
                img: "📱" 
            });
        }

        window.onload = () => {
            const list = document.getElementById('product-list');
            products.forEach(p => {
                list.innerHTML += `
                    <div class="product-card">
                        <div style="font-size:40px;">${p.img}</div>
                        <h3>${p.name}</h3>
                        <p>Rp ${p.price.toLocaleString('id-ID')}</p>
                        <button class="btn-buy" onclick="checkout(${p.id})">BELI SEKARANG</button>
                    </div>
                `;
            });
        };

        window.checkout = async function(id) {
            const item = products.find(p => p.id === id);
            const { value: phone } = await Swal.fire({
                title: 'Metode Pembayaran: SalNew',
                text: `Beli ${item.name} seharga Rp ${item.price.toLocaleString('id-ID')}?`,
                input: 'text',
                inputPlaceholder: 'Nomor HP SalNew kamu',
                showCancelButton: true,
                confirmButtonText: 'BAYAR SEKARANG',
                confirmButtonColor: '#108ee9'
            });

            if (phone) {
                const userRef = ref(db, 'users/' + phone);
                const snap = await get(userRef);
                if (snap.exists()) {
                    const saldo = snap.val().saldo;
                    if (saldo >= item.price) {
                        await update(userRef, { saldo: saldo - item.price });
                        await push(ref(db, 'history/' + phone), {
                            type: 'BELI HP',
                            amt: item.price,
                            note: item.name,
                            date: new Date().toLocaleString()
                        });
                        Swal.fire('Sukses!', 'Smartphone Sultan berhasil dibeli!', 'success');
                    } else { Swal.fire('Gagal', 'Saldo SalNew tidak cukup!', 'error'); }
                } else { Swal.fire('Error', 'Nomor tidak terdaftar!', 'error'); }
            }
        };
    </script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 10px; margin: 0; }
        .header { background: linear-gradient(135deg, #108ee9, #003366); color: white; padding: 25px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .product-card h3 { font-size: 13px; margin: 10px 0; height: 35px; color: #333; }
        .product-card p { color: #ff4757; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        .btn-buy { width: 100%; border: none; background: #108ee9; color: white; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-buy:active { transform: scale(0.95); }
        #search-bar { width: 90%; padding: 14px; margin: 0 auto 20px auto; display: block; border-radius: 15px; border: 2px solid #108ee9; outline: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">SalNew Gadget Store</h2>
        <p style="font-size:12px; opacity:0.8; margin-top:5px;">Pusat Smartphone Sultan Terlengkap</p>
    </div>

    <input type="text" id="search-bar" placeholder="Cari iPhone, Vivo, ROG..." onkeyup="filterProduct()">

    <div class="grid" id="product-list">
        </div>

    <script>
        function filterProduct() {
            let input = document.getElementById('search-bar').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                cards[i].style.display = name.includes(input) ? "block" : "none";
            }
        }
    </script>

</body>
</html>
